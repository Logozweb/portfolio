<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard</title>
  <style>
    :root{ --bg:#0b1220; --surface:#0f172a; --card:#0e1931; --border:#223148; --muted:#8fa2bf; --text:#e6edf7; --accent:#4f9cff; --accent2:#22c55e; }
    *{box-sizing:border-box}
    body { font-family: Inter, system-ui, sans-serif; background: linear-gradient(180deg, var(--surface), var(--bg)); color: var(--text); margin:0; }
    .wrap { max-width: 1100px; margin: 28px auto; padding: 0 16px; display:grid; gap:16px }
    .topbar { display:flex; justify-content: space-between; align-items:center; }
    .brand { display:flex; align-items:center; gap:10px }
    .brand-mark { display:grid; place-items:center; width:38px; height:38px; border-radius:10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; font-weight:800; }
    .brand-name { font-weight:800 }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; box-shadow: 0 10px 28px rgba(0,0,0,.35); }
    label { display:block; margin-top: 10px; margin-bottom: 6px; font-weight: 600; }
    input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: #0b1326; color: var(--text); }
    button { margin-top: 12px; height: 42px; border-radius: 12px; border: 1px solid #3a7fdb; background: var(--accent); color: #031223; font-weight: 800; cursor:pointer }
    .add-card { width: 100%; margin: 0; }
    .form-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px }
    @media (max-width: 700px){ .form-grid { grid-template-columns: 1fr } }
    .form-control { display:flex; flex-direction:column; gap:6px }
    .board { list-style:none; margin:10px 0; padding:10px; border: 1px dashed var(--border); border-radius: 12px; min-height: 120px }
    .board li { background: #0b1326; border:1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 8px; cursor: grab; display:flex; align-items:center; justify-content:space-between; gap:8px }
    .row-btns { display:flex; gap:6px }
    .row-btns button { margin-top:0; height:32px }
    .boards { display:grid; grid-template-columns: 1fr; gap:16px; }
    .muted { color: var(--muted); }
  </style>
  <script>
    let works = [];
    function groupByCategory(list){
      return list.reduce((acc, w) => { (acc[w.category] ||= []).push(w); return acc; }, {});
    }
    function renderBoards(){
      const boards = document.getElementById('boards');
      const groups = groupByCategory(works);
      boards.innerHTML = ['web','app','seo'].map(cat => `
        <div class="card" data-cat="${cat}">
          <h3>${cat.toUpperCase()}</h3>
          <ul class="board" id="board-${cat}">
            ${(groups[cat]||[]).map(w => `<li draggable="true" data-id="${w.id}"><span>${w.title}</span><span class="row-btns"><button onclick="openEdit(${w.id})" type="button">Edit</button><button onclick="del(${w.id})" type="button" style="background:#ef4444;border-color:#b91c1c;color:#fff">Delete</button></span></li>`).join('')}
          </ul>
          <button onclick="saveOrder('${cat}')">Save ${cat} Order</button>
        </div>
      `).join('');
      initDnD();
    }
    function initDnD(){
      document.querySelectorAll('.board li').forEach(item => {
        item.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', item.dataset.id));
      });
      document.querySelectorAll('.board').forEach(list => {
        list.addEventListener('dragover', e => e.preventDefault());
        list.addEventListener('drop', e => {
          e.preventDefault();
          const id = e.dataTransfer.getData('text/plain');
          const dragged = document.querySelector(`li[data-id="${id}"]`);
          const after = e.target.closest('li');
          if (after && after.parentElement === list) list.insertBefore(dragged, after);
          else list.appendChild(dragged);
        });
      });
    }
    async function saveOrder(cat){
      const ids = Array.from(document.querySelectorAll(`#board-${cat} li`)).map(li => parseInt(li.dataset.id, 10));
      try{
        const res = await fetch('/api/works/reorder', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ category: cat, ids }) });
        const j = await res.json().catch(()=>({}));
        if (res.ok && j.ok) { alert('Saved'); }
        else if (res.status === 401 || res.redirected) { location.href = '/admin/login'; }
        else { alert(j.error || 'Failed'); }
      } catch(err){ alert('Network error'); }
    }
    async function fetchWorks(){
      const res = await fetch('/api/works');
      works = await res.json();
      renderBoards();
    }
    async function addWork(e){
      e.preventDefault();
      const form = e.target;
      const data = new FormData(form);
      const res = await fetch('/api/works', { method: 'POST', body: data, credentials: 'same-origin' });
      if(res.ok){ form.reset(); await fetchWorks(); }
    }
    async function del(id){
      if(!confirm('Delete this work?')) return;
      const res = await fetch('/api/works/'+id, { method: 'DELETE', credentials: 'same-origin' });
      if(res.ok) fetchWorks(); else alert('Delete failed');
    }
    function openEdit(id){
      const w = works.find(x => x.id === id);
      if(!w) return;
      const form = document.getElementById('edit-form');
      form.work_id.value = String(w.id);
      form.title.value = w.title;
      form.category.value = w.category;
      form.live_url.value = w.live_url || '';
      document.getElementById('edit-modal').style.display = '';
    }
    async function saveEdit(e){
      e.preventDefault();
      const form = e.target;
      const id = form.work_id.value;
      const data = new FormData(form);
      const res = await fetch('/api/works/'+id+'/edit', { method:'POST', body:data, credentials: 'same-origin' });
      if(res.ok){
        document.getElementById('edit-modal').style.display = 'none';
        form.reset();
        fetchWorks();
      } else {
        alert('Update failed');
      }
    }
    async function logout(){ await fetch('/api/logout', { method:'POST' }); location.href='/admin/login'; }
    window.addEventListener('DOMContentLoaded', fetchWorks);
  </script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><div class="brand-mark">PA</div><div class="brand-name">Portfolio Admin</div></div>
      <button onclick="logout()">Logout</button>
    </div>
    <div class="add-card card">
        <h2>Add Work</h2>
        <div class="muted">Create a new item for Web, App or SEO.</div>
      <form onsubmit="addWork(event)">
        <div class="form-grid">
          <div class="form-control">
            <label>Title</label>
            <input name="title" required />
          </div>
          <div class="form-control">
            <label>Category</label>
            <select name="category" required>
              <option value="web">Web</option>
              <option value="app">App</option>
              <option value="seo">SEO</option>
            </select>
          </div>
          <div class="form-control">
            <label>Live URL</label>
            <input name="live_url" placeholder="https://..." />
          </div>
          <div class="form-control">
            <label>Image</label>
            <input type="file" name="image" accept="image/*" required />
          </div>
        </div>
        <button type="submit">Create</button>
      </form>
    </div>
    <div class="card" style="margin-top:16px">
      <h2>Arrange Works</h2>
      <div class="muted">Drag and drop to sort order inside each category, then save.</div>
      <div id="boards" class="boards"></div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); display:grid; place-items:center;">
    <form id="edit-form" class="card" onsubmit="saveEdit(event)" style="width:min(520px,92vw);">
      <h3>Edit Work</h3>
      <input type="hidden" name="work_id" />
      <label>Title</label>
      <input name="title" required />
      <label>Category</label>
      <select name="category" required>
        <option value="web">Web</option>
        <option value="app">App</option>
        <option value="seo">SEO</option>
      </select>
      <label>Replace Image (optional)</label>
      <input type="file" name="image" accept="image/*" />
      <label>Live URL</label>
      <input name="live_url" placeholder="https://..." />
      <div style="display:flex; gap:8px; margin-top:12px">
        <button type="submit">Save</button>
        <button type="button" onclick="document.getElementById('edit-modal').style.display='none'">Cancel</button>
      </div>
    </form>
  </div>
</body>
</html>
